# Fly.io deployment config for Pulse backend
# Deploy: `fly launch --no-deploy && fly volumes create pulse_data --size 1 && fly deploy`
app = "pulse-backend"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  PORT = "4000"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "pulse_data"
  destination = "/app/data"

[[mounts]]
  source = "pulse_uploads"
  destination = "/app/uploads"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
